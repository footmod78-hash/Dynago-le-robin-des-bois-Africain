<!DOCTYPE html>
<html lang="fr">

    <title>DYNAGO : VIOLET & BLANC</title>

            font-family: 'Trebuchet MS', sans-serif;

            margin-top: 40px;
        }

            margin-bottom: 15px;
            color: #f0f0f0;
        }
